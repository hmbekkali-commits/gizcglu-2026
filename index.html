"legchiffre": {"fr": "", "en": "", "ar": ""}, "citation": {"fr": "La SRM Marrakech-Safi a participé au World Water Skills dans le cadre de l'IFAT à Munich 2026.", "en": "The SRM Marrakech-Safi took part in the World Water Skills competition at IFAT in Munich, 2026.", "ar": "شاركت الشركة الجهوية متعددة الخدمات بمراكش آسفي في مسابقة World Water Skills ضمن معرض IFAT بميونيخ 2026."}, "auteur": "", "roleauteur": {"fr": "", "en": "", "ar": ""}, "region": {"fr": "Marrakech-Safi", "en": "Marrakech-Safi", "ar": "مراكش آسفي"}, "statut": {"fr": "En cours", "en": "Ongoing", "ar": "جارٍ"}, "transposable": {"fr": "L'accompagnement à la montée en compétence d'un opérateur régional de service est transposable à tout territoire qui réorganise ses services essentiels.", "en": "Supporting the capacity-building of a regional service operator is transposable to any territory reorganising its essential services.", "ar": "مواكبة الرفع من كفاءة مُشغّل جهوي للخدمات قابلة للنقل إلى أي مجال يعيد تنظيم خدماته الأساسية."}, "contactNom": "Michael Kirchesch", "contactRole": {"fr": "Conseiller technique principal, CESAR II", "en": "Principal Technical Advisor, CESAR II", "ar": "المستشار التقني الرئيسي، CESAR II"}, "contactMail": "michael.kirchesch@giz.de", "video": "", "videoCap": {"fr": "", "en": "", "ar": ""}, "img": "images/initiatives/cesar2-01-professionnalisation-d.jpg"}, {"levier": {"fr": "Renforcement de capacités"}, "icon": "🌱", "titre": {"fr": "L'emploi vert local dans les territoires du séisme", "en": "Local green jobs in the earthquake-stricken territories", "ar": "الوظائف الخضراء المحلية في المناطق المتضررة من الزلزال"}, "accroche": {"fr": "Former et installer de jeunes techniciens — femmes et hommes — sur leurs propres territoires, après le séisme.", "en": "Training and establishing young technicians, women and men, in their own territories after the earthquake.", "ar": "تكوين شباب تقنيين، نساءً ورجالاً، وتمكينهم من الاستقرار في مجالاتهم بعد الزلزال."}, "defi": {"fr": "Dans les zones rurales de Marrakech-Safi touchées par le séisme, les jeunes diplômés techniques peinaient à s'insérer faute d'accompagnement vers l'emploi ou l'entrepreneuriat, un frein à la reconstruction économique locale.", "en": "In the rural areas of Marrakech-Safi affected by the earthquake, young technical graduates struggled to find their place for lack of support toward employment or entrepreneurship, a brake on local economic reconstruction.", "ar": "في المناطق القروية بمراكش آسفي المتضررة من الزلزال، كان الخريجون التقنيون الشباب يجدون صعوبة في الاندماج لغياب المواكبة نحو التشغيل أو المقاولة، وهو ما يكبح إعادة البناء الاقتصادي المحلي."}, "reponse": {"fr": "CESAR II forme aux métiers de l'eau, de l'assainissement et des énergies renouvelables, puis accompagne l'installation : auto-entrepreneuriat, création de coopératives, soft skills et employabilité, avec une attention forte à l'inclusion des femmes et des populations rurales.", "en": "CESAR II trains in water, sanitation and renewable energy trades, then supports establishment: self-employment, cooperative creation, soft skills and employability, with strong attention to the inclusion of women and rural populations.", "ar": "يكوّن مشروع CESAR II في مهن الماء والتطهير السائل والطاقات المتجددة، ثم يواكب الاستقرار المهني: المقاولة الذاتية، وإحداث التعاونيات، والمهارات الناعمة والقابلية للتشغيل، مع اهتمام قوي بإدماج النساء والساكنة القروية."}, "declicType": "quote", "chiffre": "", "legchiffre": {"fr": "", "en": "", "ar": ""}, "citation": {"fr": "Après une formation aux métiers de l'assainissement, j'ai cofondé avec mes voisins une coopérative de toilettes mobiles. Aujourd'hui, je suis prêt à affronter mon avenir professionnel sereinement.", "en": "After training in sanitation trades, I co founded a mobile toilets cooperative with my neighbours. Today, I feel ready to face my professional future with confidence.", "ar": "بعد تكوين في مهن التطهير السائل، أسستُ مع جيراني تعاونية لإنتاج المراحيض المتنقلة. اليوم، أشعر أنني مستعد لمواجهة مستقبلي المهني بكل اطمئنان."}, "auteur": "Abdelwahed", "roleauteur": {"fr": "Chef technique de la coopérative CESAR-Al Haouz", "en": "Technical lead of the CESAR Al Haouz cooperative", "ar": "المسؤول التقني لتعاونية CESAR الحوز"}, "region": {"fr": "Marrakech-Safi", "en": "Marrakech-Safi", "ar": "مراكش آسفي"}, "statut": {"fr": "En cours", "en": "Ongoing", "ar": "جارٍ"}, "transposable": {"fr": "Le modèle formation et installation locale est réplicable dans tout territoire rural cherchant à retenir et employer ses jeunes, en particulier en contexte de reconstruction.", "en": "The training plus local establishment model is replicable in any rural territory seeking to retain and employ its young people, particularly in a reconstruction context.", "ar": "نموذج التكوين والاستقرار المحلي قابل للتكرار في أي مجال قروي يسعى إلى استبقاء شبابه وتشغيلهم، خاصة في سياق إعادة البناء."}, "contactNom": "Michael Kirchesch", "contactRole": {"fr": "Conseiller technique principal, CESAR II", "en": "Principal Technical Advisor, CESAR II", "ar": "المستشار التقني الرئيسي، CESAR II"}, "contactMail": "michael.kirchesch@giz.de", "video": "", "videoCap": {"fr": "", "en": "", "ar": ""}, "img": "images/initiatives/cesar2-02-l-emploi-vert-local-da.jpg"}]}, {"id": "Territoires durables", "axe": "2", "titre": {"fr": "Des territoires résilients face au climat", "en": "Territories resilient to climate change", "ar": "مجالات صامدة في وجه المناخ"}, "acronyme": "Territoires durables", "mission": {"fr": "Le projet vise à renforcer la résilience des populations du Haut Atlas, durement touchées par le séisme de 2023, en favorisant une utilisation plus durable des ressources naturelles, en particulier l'eau, et en réduisant leur exposition aux risques naturels.", "en": "The project aims to strengthen the resilience of the populations of the High Atlas, hard hit by the 2023 earthquake, by promoting a more sustainable use of natural resources, particularly water, and by reducing their exposure to natural risks.", "ar": "يهدف المشروع إلى تعزيز قدرة ساكنة الأطلس الكبير، التي تضررت بشدة من زلزال 2023، على الصمود، عبر تشجيع استعمال أكثر استدامة للموارد الطبيعية، ولا سيما الماء، والحد من تعرضها للمخاطر الطبيعية."}, "partenaire": "Ministère de l'équipe et de l'eau", "periode": "2024-2029", "img": "images/projets/territoires-durables.jpg", "drive": "https://hmbekkali-commits.github.io/gizcglu-2026/docs/territoires-durables/", "initiatives": [{"levier": {"fr": ""}, "icon": "⛰️", "titre": {"fr": "Modes de vie durables et résilients au Maroc", "en": "Sustainable and resilient livelihoods in Morocco", "ar": "سبل عيش مستدامة وصامدة بالمغرب"}, "accroche": {"fr": "Renforcer la résilience des populations du Haut Atlas frappées par le séisme, par une gestion durable de l'eau.", "en": "Strengthening the resilience of the earthquake-stricken High Atlas populations through sustainable water management.", "ar": "تعزيز صمود ساكنة الأطلس الكبير المتضررة من الزلزال عبر تدبير مستدام للماء."}, "defi": {"fr": "Déjà sous forte pression avant le séisme du 8 septembre 2023, les ressources en eau du Haut Atlas vitales pour les communautés rurales ont été encore fragilisées par la catastrophe, perturbant l'accès à l'eau et les moyens de subsistance.", "en": "Already under heavy pressure before the earthquake of 8 September 2023, the High Atlas water resources, vital for rural communities, were further weakened by the disaster, disrupting access to water and means of subsistence.", "ar": "كانت الموارد المائية بالأطلس الكبير، الحيوية للمجتمعات القروية، تحت ضغط شديد قبل زلزال 8 شتنبر 2023، فزادتها الكارثة هشاشةً، مُخلّةً بالولوج إلى الماء وبسبل العيش."}, "reponse": {"fr": "Le projet agit sur trois fronts : instaurer une gouvernance concertée de l'eau (contrat de rivière de l'Ourika réunissant communes, usagers et institutions), déployer des pilotes d'hydraulique villageoise et des solutions fondées sur la nature, et développer des chaînes de valeur vertes au bénéfice des communautés.", "en": "The project acts on three fronts: establishing concerted water governance (the Ourika river contract bringing together municipalities, users and institutions), deploying village hydraulics pilots and nature-based solutions, and developing green value chains for the benefit of communities.", "ar": "يعمل المشروع على ثلاث جبهات: إرساء حكامة تشاركية للماء (عقد نهر أوريكا الذي يجمع الجماعات والمستعملين والمؤسسات)، وإطلاق مشاريع نموذجية للهيدروليك القروي وحلول قائمة على الطبيعة، وتطوير سلاسل قيمة خضراء لفائدة المجتمعات."}, "declicType": "number", "chiffre": "8", "legchiffre": {"fr": "le nombre de sources d'eau dont le projet vise l'aménagement.", "en": "the number of water sources the project aims to develop.", "ar": "عدد منابع الماء التي يستهدف المشروع تهيئتها."}, "citation": {"fr": "", "en": "", "ar": ""}, "auteur": "", "roleauteur": {"fr": "", "en": "", "ar": ""}, "region": {"fr": "Haut Atlas", "en": "High Atlas", "ar": "الأطلس الكبير"}, "statut": {"fr": "En cours", "en": "Ongoing", "ar": "جارٍ"}, "transposable": {"fr": "L'approche territoriale intégrée axée autour d'une gouvernance de bassin, solutions fondées sur la nature, chaînes de valeur vertes est conçue dès l'origine pour être répliquée dans d'autres régions du Maroc.", "en": "The integrated territorial approach, built around basin governance, nature-based solutions and green value chains, is designed from the outset to be replicated in other regions of Morocco.", "ar": "المقاربة المجالية المندمجة، القائمة على حكامة الحوض والحلول المستندة إلى الطبيعة وسلاسل القيمة الخضراء، مصممة منذ البداية لتُكرَّر في جهات أخرى بالمغرب."}, "contactNom": "Anne Chaponnière", "contactRole": {"fr": "Conseillère technique principale, Territoires durables", "en": "Principal Technical Advisor, Sustainable Territories", "ar": "المستشارة التقنية الرئيسية، الأقاليم المستدامة"}, "contactMail": "anne.chaponniere@giz.de", "video": "", "videoCap": {"fr": "", "en": "", "ar": ""}, "img": "images/initiatives/territoires-durables-01-modes-de-vie-durables.jpg"}]}, {"id": "DKTI", "axe": "2", "titre": {"fr": "Réinventer la mobilité urbaine durable", "en": "Reinventing sustainable urban mobility", "ar": "إعادة ابتكار التنقل الحضري المستدام"}, "acronyme": "DKTI VI", "mission": {"fr": "Décarboner les transports et développer une mobilité urbaine durable, à l'échelle nationale et dans la ville pilote d'Agadir.", "en": "To decarbonise transport and develop sustainable urban mobility, at national level and in the pilot city of Agadir.", "ar": "إزالة الكربون من قطاع النقل وتطوير تنقل حضري مستدام، على المستوى الوطني وفي مدينة أكادير النموذجية."}, "partenaire": "Ministère de la Transition Energétique et du Développement durable (MTEDD); Ministère de l'Intérieur, Ministère du Transport et de la Logistique, Wilaya d'Agadir, Région Souss Massa, Commune d'Agadir et autres.", "periode": "2022-2027", "img": "images/projets/dkti.jpg", "drive": "https://hmbekkali-commits.github.io/gizcglu-2026/docs/dkti/", "initiatives": [{"levier": {"fr": "Assistance technique"}, "icon": "🚌", "titre": {"fr": "La mobilité durable à Agadir", "en": "Sustainable mobility in Agadir", "ar": "التنقل المستدام بأكادير"}, "accroche": {"fr": "Faire d'Agadir une ville pilote de la mobilité propre, intégrée et accessible à tous.", "en": "Making Agadir a pilot city for clean, integrated mobility that is accessible to all.", "ar": "جعل أكادير مدينة نموذجية للتنقل النظيف والمندمج والمتاح للجميع."}, "defi": {"fr": "Au Maroc, les transports représentent près de 30 % des émissions de CO₂ et 38 % de la consommation d'énergie finale. Avec l'urbanisation et la hausse du trafic, les villes subissent pollution, embouteillages, bruit et dégradation du cadre de vie.", "en": "In Morocco, transport accounts for nearly 30% of CO2 emissions and 38% of final energy consumption. As cities grow and traffic rises, residents face pollution, congestion, noise and a declining quality of life.", "ar": "يمثل قطاع النقل بالمغرب نحو 30% من انبعاثات ثاني أكسيد الكربون و38% من الاستهلاك النهائي للطاقة. ومع التوسع الحضري وتزايد حركة السير، تعاني المدن من التلوث والاكتظاظ والضجيج وتدهور إطار العيش."}, "reponse": {"fr": "À Agadir, DKTI VI conçoit avec la commune des plans de développement et des projets pilotes de mobilité durable : intégration des modes de transport (multimodalité, dont le BHNS), digitalisation des services, et mobilité douce. Le projet forme aussi les agents municipaux et les décideurs, et organise des événements de sensibilisation comme les journées sans voiture.", "en": "In Agadir, DKTI VI works with the municipality to design development plans and pilot projects for sustainable mobility: integration of transport modes (multimodality, including the BRT), digitalisation of services and soft mobility. The project also trains municipal staff and decision-makers, and runs awareness events such as car-free days.", "ar": "بأكادير، يصمم مشروع DKTI VI مع الجماعة مخططات للتنمية ومشاريع نموذجية للتنقل المستدام: دمج وسائل النقل (تعدد الوسائط، بما في ذلك الحافلات ذات الخدمة العالية)، ورقمنة الخدمات، والتنقل الناعم. كما يكوّن المشروع أعوان الجماعة وأصحاب القرار، وينظم فعاليات للتحسيس مثل أيام بدون سيارة."}, "declicType": "number", "chiffre": "−24 %", "legchiffre": {"fr": "l'objectif national de consommation d'énergie visée dans les transports entre 2017 et 2030 (Stratégie nationale d'efficacité énergétique)", "en": "the national target for reducing energy consumption in transport between 2017 and 2030 (National Energy Efficiency Strategy)", "ar": "الهدف الوطني لخفض استهلاك الطاقة في قطاع النقل بين 2017 و2030 (الاستراتيجية الوطنية للنجاعة الطاقية)"}, "citation": {"fr": "", "en": "", "ar": ""}, "auteur": "", "roleauteur": {"fr": "", "en": "", "ar": ""}, "region": {"fr": "Agadir", "en": "Agadir", "ar": "أكادير"}, "statut": {"fr": "En cours", "en": "Ongoing", "ar": "جارٍ"}, "transposable": {"fr": "Les connaissances acquises à Agadir sont explicitement conçues pour servir de modèle aux autres villes marocaines voulant bâtir un système de mobilité urbaine durable.", "en": "The knowledge built in Agadir is designed from the outset to serve as a model for other Moroccan cities seeking to build a sustainable urban mobility system.", "ar": "المعارف المتراكمة بأكادير مصممة منذ البداية لتكون نموذجاً لمدن مغربية أخرى ترغب في بناء منظومة للتنقل الحضري المستدام."}, "contactNom": "Sebastian Ibold", "contactRole": {"fr": "Conseiller technique principal", "en": "Principal technical advisor", "ar": "مستشار التقني الرئيسي"}, "contactMail": "sebastian.ibold@giz.de", "video": "", "videoCap": {"fr": "", "en": "", "ar": ""}, "img": "images/initiatives/dkti-01-la-mobilite-durable-a.jpg"}, {"levier": {"fr": "Assistance technique"}, "icon": "📱", "titre": {"fr": "Innovation & digitalisation de la mobilité", "en": "Innovation and digitalisation of mobility", "ar": "الابتكار ورقمنة التنقل"}, "accroche": {"fr": "Mettre le numérique au service d'une mobilité urbaine plus fluide et mieux pilotée.", "en": "Putting digital tools to work for smoother, better-managed urban mobility.", "ar": "تسخير الرقمنة من أجل تنقل حضري أكثر سلاسة وأفضل تدبيراً."}, "defi": {"fr": "Les systèmes de mobilité manquent d'outils numériques pour informer les voyageurs et piloter les services.", "en": "Mobility systems lack the digital tools needed to inform travellers and steer services.", "ar": "تفتقر منظومات التنقل إلى الأدوات الرقمية اللازمة لإعلام المسافرين وقيادة الخدمات."}, "reponse": {"fr": "Le projet déploie des solutions numériques pour améliorer l'expérience usager, l'information voyageurs et le pilotage, et fédère les acteurs autour d'une vision commune des services intelligents.", "en": "The project rolls out digital solutions to improve the user experience, passenger information and service management, and brings actors together around a shared vision of smart services.", "ar": "ينشر المشروع حلولاً رقمية لتحسين تجربة المستعمل وإعلام المسافرين وقيادة الخدمات، ويوحّد الفاعلين حول رؤية مشتركة للخدمات الذكية."}, "declicType": "", "chiffre": "", "legchiffre": {"fr": "", "en": "", "ar": ""}, "citation": {"fr": "", "en": "", "ar": ""}, "auteur": "", "roleauteur": {"fr": "", "en": "", "ar": ""}, "region": {"fr": "", "en": "", "ar": ""}, "statut": {"fr": "", "en": "", "ar": ""}, "transposable": {"fr": "Le socle numérique est réplicable dans toute ville modernisant ses transports.", "en": "The digital foundation can be replicated in any city modernising its transport.", "ar": "الأساس الرقمي قابل للتكرار في أي مدينة تعمل على تحديث نقلها."}, "contactNom": "", "contactRole": {"fr": "", "en": "", "ar": ""}, "contactMail": "", "video": "", "videoCap": {"fr": "", "en": "", "ar": ""}, "img": "images/initiatives/dkti-02-innovation-digitalisat.jpg"}, {"levier": {"fr": "Gouvernance"}, "icon": "♿", "titre": {"fr": "Une mobilité inclusive et accessible", "en": "Inclusive and accessible mobility", "ar": "تنقل دامج وميسَّر الولوج"}, "accroche": {"fr": "Penser la mobilité pour tous, quel que soit le genre, l'âge ou la capacité.", "en": "Designing mobility for everyone, whatever their gender, age or ability.", "ar": "تصميم تنقل يشمل الجميع، أياً كان نوعهم أو سنهم أو قدرتهم."}, "defi": {"fr": "La mobilité urbaine ne prend pas assez en compte le genre, l'accessibilité et la sécurité.", "en": "Urban mobility does not take sufficient account of gender, accessibility and safety.", "ar": "لا يراعي التنقل الحضري بما يكفي النوع الاجتماعي وسهولة الولوج والسلامة."}, "reponse": {"fr": "Le projet promeut une mobilité inclusive, accessible et abordable, intégrant genre, accessibilité et sécurité, et valorise la mobilité douce comme levier de proximité.", "en": "The project promotes inclusive, accessible and affordable mobility, integrating gender, accessibility and safety, and champions soft mobility as a lever for urban proximity.", "ar": "يعزز المشروع تنقلاً دامجاً وميسَّر الولوج وفي المتناول، يدمج النوع الاجتماعي وسهولة الولوج والسلامة، ويثمّن التنقل الناعم كرافعة للقرب الحضري."}, "declicType": "", "chiffre": "", "legchiffre": {"fr": "", "en": "", "ar": ""}, "citation": {"fr": "", "en": "", "ar": ""}, "auteur": "", "roleauteur": {"fr": "", "en": "", "ar": ""}, "region": {"fr": "", "en": "", "ar": ""}, "statut": {"fr": "", "en": "", "ar": ""}, "transposable": {"fr": "L'approche inclusive est transposable à toute politique de mobilité urbaine.", "en": "The inclusive approach can be transposed to any urban mobility policy.", "ar": "المقاربة الدامجة قابلة للنقل إلى أي سياسة للتنقل الحضري."}, "contactNom": "", "contactRole": {"fr": "", "en": "", "ar": ""}, "contactMail": "", "video": "", "videoCap": {"fr": "", "en": "", "ar": ""}, "img": "images/initiatives/dkti-03-une-mobilite-inclusive.jpg"}]}]}, {"id": "serv", "theme": "serv", "num": "03", "title": {"fr": "Services publics de proximité", "en": "Local public services", "ar": "تقريب الخدمات العمومية"}, "projects": [{"id": "BGF", "axe": "3", "titre": {"fr": "Renforcer la gestion financière des collectivités", "en": "Strengthening local government finances", "ar": "تعزيز التدبير المالي للجماعات الترابية"}, "acronyme": "BGF", "mission": {"fr": "Les conditions et instruments visant à générer davantage des recettes propres tout en gérant les budgets de manière efficace et transparente dans les régions et les communes sont développés.", "en": "The conditions and instruments to generate more own revenues while managing budgets efficiently and transparently in regions and municipalities are developed.", "ar": "تطوير الشروط والأدوات الكفيلة بتوليد مزيد من الموارد الذاتية مع تدبير الميزانيات بفعالية وشفافية على مستوى الجهات والجماعات."}, "partenaire": "Ministère de l'intérieur / DGCT", "periode": "2021-2026", "img": "images/projets/bgf.jpg", "drive": "https://hmbekkali-commits.github.io/gizcglu-2026/docs/bgf/", "initiatives": [{"levier": {"fr": "Assistance technique"}, "icon": "💰", "titre": {"fr": "Les Plans de Mobilisation des Recettes au sein des collectivités", "en": "Revenue Mobilisation Plans within local authorities", "ar": "مخططات تعبئة المداخيل داخل الجماعات الترابية"}, "accroche": {"fr": "Un outil de gouvernance interne, porté politiquement par les élus locaux et opérationnellement par les services communaux.", "en": "An internal governance tool, championed politically by elected officials and operationally by municipal services.", "ar": "أداة للحكامة الداخلية، يحملها سياسياً المنتخبون وعملياً المصالح الجماعية."}, "defi": {"fr": "Dans de nombreuses collectivités, la mobilisation des recettes repose encore largement sur des pratiques fragmentées, peu formalisées et fortement dépendantes des personnes plutôt que des systèmes. Les recettes sont mobilisées, mais rarement à partir d'une stratégie claire, partagée et suivie dans le temps.", "en": "In many local authorities, revenue mobilisation still relies largely on fragmented, poorly formalised practices that depend heavily on individuals rather than systems. Revenues are mobilised, but rarely from a clear strategy that is shared and monitored over time.", "ar": "في العديد من الجماعات، لا تزال تعبئة المداخيل تعتمد إلى حد كبير على ممارسات مجزأة وغير ممأسسة، وترتبط بالأشخاص أكثر من ارتباطها بالأنظمة. فالمداخيل تُعبأ، لكن نادراً ما يتم ذلك انطلاقاً من استراتيجية واضحة ومشتركة ومتابَعة عبر الزمن."}, "reponse": {"fr": "Les PMR apportent aux communes un cadre structurant leur permettant de passer d'une logique réactive à une démarche stratégique et pilotée. 8 communes pilotes ont été accompagnées dans la mise en œuvre de la Plan de mobilisation des recettes. Chaque PMR a débouché sur une stratégie d'actions structurée, visant à améliorer la mobilisation des recettes sans alourdir la pression fiscale. L'accent a été mis sur l'élargissement de l'assiette, l'amélioration des pratiques de déclaration et de paiement, le renforcement du contrôle et l'optimisation du recouvrement.", "en": "The Revenue Mobilisation Plans give municipalities a structuring framework that allows them to move from a reactive logic to a strategic, steered approach. 8 pilot municipalities were supported in rolling out their Revenue Mobilisation Plan. Each plan resulted in a structured action strategy aimed at improving revenue mobilisation without increasing the tax burden. The focus was on broadening the tax base, improving declaration and payment practices, strengthening control and optimising collection.", "ar": "تمنح مخططات تعبئة المداخيل الجماعات إطاراً منظِّماً يتيح لها الانتقال من منطق رد الفعل إلى مقاربة استراتيجية موجَّهة. وقد تمت مواكبة 8 جماعات نموذجية في تنزيل مخطط تعبئة المداخيل. وأفضى كل مخطط إلى استراتيجية عمل منظَّمة تهدف إلى تحسين تعبئة المداخيل دون رفع الضغط الجبائي، مع التركيز على توسيع الوعاء الضريبي وتحسين ممارسات التصريح والأداء وتعزيز المراقبة وتحسين التحصيل."}, "declicType": "number", "chiffre": "48", "legchiffre": {"fr": "Mesures réalisées dans le cadre des PMR dans 8 communes", "en": "measures carried out under the Revenue Mobilisation Plans in 8 municipalities", "ar": "إجراءً تم إنجازه في إطار مخططات تعبئة المداخيل في 8 جماعات"}, "citation": {"fr": "", "en": "", "ar": ""}, "auteur": "", "roleauteur": {"fr": "", "en": "", "ar": ""}, "region": {"fr": "3 régions : Marrakech- Safi ; Guelmim - Oued noun ; Souss-Massa", "en": "3 regions: Marrakech-Safi; Guelmim Oued Noun; Souss Massa", "ar": "3 جهات: مراكش آسفي؛ كلميم وادي نون؛ سوس ماسة"}, "statut": {"fr": "En cours", "en": "Ongoing", "ar": "جارٍ"}, "transposable": {"fr": "Cette approche est transposable à d'autres collectivités locales.", "en": "This approach is transposable to other local authorities.", "ar": "هذه المقاربة قابلة للنقل إلى جماعات ترابية أخرى."}, "contactNom": "Othman Fahim", "contactRole": {"fr": "Conseiller technique, BGF", "en": "Technical Advisor, BGF", "ar": "مستشار تقني، BGF"}, "contactMail": "othmane.fahim@giz.de", "video": "", "videoCap": {"fr": "", "en": "", "ar": ""}, "img": "images/initiatives/bgf-01-les-plans-de-mobilisat.jpg"}, {"levier": {"fr": "Gouvernance"}, "icon": "⚖️", "titre": {"fr": "Coûts induits/additionnels et Intégration du genre dans la planification", "en": "Induced/additional costs and gender mainstreaming in planning", "ar": "التكاليف المُحدَثة/الإضافية وإدماج النوع في التخطيط"}, "accroche": {"fr": "Concilier ambition d'investissement, réalisme budgétaire et prise en compte des impacts sociaux.", "en": "Reconciling investment ambition, budget realism and consideration of social impacts.", "ar": "التوفيق بين طموح الاستثمار والواقعية الميزانياتية ومراعاة الآثار الاجتماعية."}, "defi": {"fr": "Dans de nombreux contextes, les projets sont conçus et programmés principalement à partir de leur coût initial, sans toujours anticiper les charges futures qu'ils ne génèrent ni les effets différenciés qu'ils peuvent produire sur les populations.", "en": "In many contexts, projects are designed and programmed primarily on the basis of their initial cost, without always anticipating the future charges they generate or the differentiated effects they may have on populations.", "ar": "في سياقات عديدة، تُصمَّم المشاريع وتُبرمَج أساساً انطلاقاً من كلفتها الأولية، دون استباق دائم للأعباء المستقبلية التي تولّدها أو للآثار المتباينة التي قد تُحدثها على الساكنة."}, "reponse": {"fr": "Le projet est intervenu en amont de la décision, au niveau de la planification afin d'intégrer les coûts induits et additionnels des investissements et ainsi améliorer la soutenabilité financière des plans d'action communaux et régionaux. Le projet a également intégré la dimension genre afin de rendre la planification plus inclusive et plus attentive aux inégalités. Le tout sans complexifier, mais en faisant évoluer progressivement les outils existants.", "en": "The project intervened upstream of the decision, at the planning level, to factor in the induced and additional costs of investments and thereby improve the financial sustainability of municipal and regional action plans. The project also mainstreamed the gender dimension to make planning more inclusive and more attentive to inequalities, all without adding complexity but by gradually evolving the existing tools.", "ar": "تدخّل المشروع في مرحلة ما قبل القرار، على مستوى التخطيط، لإدماج التكاليف المُحدَثة والإضافية للاستثمارات وبالتالي تحسين الاستدامة المالية لمخططات العمل الجماعية والجهوية. كما أدمج المشروع بُعد النوع لجعل التخطيط أكثر شمولية وأكثر انتباهاً للتفاوتات، دون زيادة في التعقيد، بل عبر تطوير تدريجي للأدوات القائمة."}, "declicType": "quote", "chiffre": "", "legchiffre": {"fr": "", "en": "", "ar": ""}, "citation": {"fr": "En reliant la question du genre à des enjeux concrets, emploi, accès aux services, sécurité, autonomie économique, le projet a contribué à dépasser une vision perçue comme abstraite ou extérieure aux préoccupations locales.", "en": "By linking the gender question to concrete issues, employment, access to services, safety, economic autonomy, the project helped move beyond a vision perceived as abstract or external to local concerns.", "ar": "عبر ربط مسألة النوع بقضايا ملموسة، كالتشغيل والولوج إلى الخدمات والأمن والاستقلالية الاقتصادية، ساهم المشروع في تجاوز رؤية كانت تُعتبر مجردة أو خارجة عن الانشغالات المحلية."}, "auteur": "Othmane Fahim", "roleauteur": {"fr": "Conseiller technique, BGF", "en": "Technical Advisor, BGF", "ar": "مستشار تقني، BGF"}, "region": {"fr": "3 régions : Marrakech- Safi ; Guelmim - Oued noun ; Souss-Massa", "en": "3 regions: Marrakech-Safi; Guelmim Oued Noun; Souss Massa", "ar": "3 جهات: مراكش آسفي؛ كلميم وادي نون؛ سوس ماسة"}, "statut": {"fr": "En cours", "en": "Ongoing", "ar": "جارٍ"}, "transposable": {"fr": "Cette approche est transposable à d'autres collectivités locales.", "en": "This approach is transposable to other local authorities.", "ar": "هذه المقاربة قابلة للنقل إلى جماعات ترابية أخرى."}, "contactNom": "Othman Fahim", "contactRole": {"fr": "Conseiller technique, BGF", "en": "Technical Advisor, BGF", "ar": "مستشار تقني، BGF"}, "contactMail": "mailto:omar.bennouna@giz.de", "video": "", "videoCap": {"fr": "", "en": "", "ar": ""}, "img": "images/initiatives/bgf-02-couts-induits-addition.jpg"}, {"levier":   else if(nav.axis)v=viewProjects();else v=viewHome();
  main.innerHTML=`<div class="screen active">${v}</div>`;main.scrollTop=0;if(!nav.axis){setTimeout(highlightTitle,10);}}
function startHomeBg(){
  const imgs=['images/accueil/accueil-1.jpg','images/accueil/accueil-2.jpg','images/accueil/accueil-3.jpg'];
  const bg=document.getElementById('homeBg');
  bg.innerHTML=imgs.map((s,i)=>`<div class="slide${i===0?' active':''}" style="background-image:url('${s}')"></div>`).join('');
  let idx=0;const slides=bg.querySelectorAll('.slide');
  if(window._homeTimer)clearInterval(window._homeTimer);
  window._homeTimer=setInterval(()=>{slides[idx].classList.remove('active');
    idx=(idx+1)%slides.length;slides[idx].classList.add('active');},4000);
}
function stopHomeBg(){if(window._homeTimer)clearInterval(window._homeTimer);
  const bg=document.getElementById('homeBg');if(bg)bg.innerHTML='';}
function viewHome(){
  const cards=DATA.axes.map(a=>`<div class="axis-card" data-theme="${a.theme}" onclick="go('axis',{axis:'${a.id}'})">
    <div class="glow"></div><div><div class="axis-num">${a.num}</div><div class="axis-bar"></div>
    <h3>${T(a.title)}</h3></div>
    <div class="axis-foot"><span class="axis-count">${a.projects.length} ${a.projects.length>1?T(I18N.proj):T(I18N.proj1)}</span>
    <div class="axis-go">→</div></div></div>`).join('');
  return `<div class="home-intro"><span class="kicker">${T(I18N.kicker)}</span>
    <h2 class="display">${T(I18N.homeTitle)}</h2><p>${T(I18N.homeSub)}</p></div><div class="axes">${cards}</div>`;}
function viewProjects(){
  const a=getAxis(),color=themeColor(a.theme);
  const cards=a.projects.map(p=>{
    const bg=p.img?`style="background-image:url('${p.img}')"`:'';
    const ph=p.img?'':`<span class="ph">${p.id}</span>`;
    const acr=p.acronyme?`<span class="pacr">${p.acronyme}</span>`:'';
    return `<div class="project-card" onclick="go('project',{axis:'${a.id}',project:'${p.id}'})">
    <div class="pimg" ${bg}>${acr}${ph}</div>
    <div class="pbody"><h3>${T(p.titre)}</h3><p class="pmission">${T(p.mission)}</p>
    <div class="pfoot"><span class="pcount">${p.initiatives.length} ${p.initiatives.length>1?T(I18N.init):T(I18N.init1)}</span>
    <span class="parrow">→</span></div></div></div>`;}).join('');
  return `<div class="section-head"><span class="tag" style="background:${color}">${a.num} · ${T(a.title)}</span>
    <h2 class="display">${T(I18N.projectsIn)}</h2></div><div class="projects">${cards}</div>`;}
function viewInits(){
  const a=getAxis(),p=getProject(),color=themeColor(a.theme);
  const cards=p.initiatives.map((n,idx)=>`<div class="init-card" onclick="go('init',{axis:'${a.id}',project:'${p.id}',init:${idx}})">
    <div class="init-icon">${n.icon}</div><div class="init-info"><div class="type">${T(n.levier)}</div>
    <h3>${T(n.titre)}</h3><p>${T(n.accroche)}</p></div><div class="init-arrow">→</div></div>`).join('');
  const acr=p.acronyme?`<span class="proj-acr">${p.acronyme}</span>`:'';
  const heroBg=p.img?`<div class="proj-hero-bg" style="background-image:url('${p.img}')"></div>`
                    :`<div class="proj-hero-bg empty"></div>`;
  const facts=[
    [T(I18N.period),p.periode],[T(I18N.partner),p.partenaire]
  ].filter(f=>f[1]).map(f=>`<span class="ph-fact"><b>${f[0]}:</b> ${f[1]}</span>`).join('');
  return `<div class="proj-wrap">
    <div class="proj-hero">${heroBg}
      <div class="proj-hero-content">
        ${acr}
        <span class="tag" style="background:${color}">${a.num} · ${T(a.title)}</span>
        <h2 class="display">${T(p.titre)}</h2>
        <p class="proj-mission">${T(p.mission)}</p>
        ${facts?`<div class="proj-hero-facts">${facts}</div>`:''}
      </div>
    </div>
    <h3 class="inits-label">${T(I18N.initiativesIn)}</h3>
    <div class="inits">${cards}</div>
    ${qrBlock(p)}
  </div>`;}
function qrBlock(p){
  const has=p.drive&&p.drive.trim()!=='';
  const id='qr_'+p.id.replace(/[^a-z0-9]/gi,'');
  setTimeout(()=>{if(has){try{const qr=qrcode(0,'M');qr.addData(p.drive);qr.make();
    const el=document.getElementById(id);if(el)el.innerHTML=qr.createImgTag(4,0);}catch(e){console.warn('QR',e);}}},30);
  return `<div class="qr-block ${has?'':'empty'}">
    <div class="qr-canvas" id="${id}">${has?'':'QR'}</div>
    <div class="qr-txt"><h4>${T(I18N.qrTitle)}</h4>
    <p><span class="scan-icn">▣</span> ${T(I18N.qrHint)}</p></div></div>`;}
function viewDetail(){
  const a=getAxis(),p=getProject(),n=getInit(),color=themeColor(a.theme);
  let declic="";
  if(n.declicType==="number"&&n.chiffre)declic=`<div class="declic is-num" style="background:${color}">
    <div class="big">${n.chiffre}</div><div class="num-lbl">${T(n.legchiffre)}</div></div>`;
  else if(n.declicType==="quote"&&T(n.citation))declic=`<div class="declic is-quote" style="background:${color}">
    <div class="quote">« ${T(n.citation)} »</div>${n.auteur?`<div class="who">${n.auteur}${T(n.roleauteur)?' · <span class="role">'+T(n.roleauteur)+'</span>':''}</div>`:''}</div>`;
  let video="";
  if(n.video&&n.video.trim()!=="")video=`<div class="video-wrap" onclick="openVideo('${n.video}')">
    <div class="vthumb"></div><div class="play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
    ${T(n.videoCap)?'<div class="video-cap">'+T(n.videoCap)+'</div>':''}`;
  const heroSrc=(n.img&&n.img.trim()!=='')?n.img:(p.img||'');
  const heroImg=heroSrc?`<div class="hero-bg" style="background-image:url('${heroSrc}')"></div>`:`<div class="hero-bg empty"></div>`;
  let contact="";
  if(n.contactNom){
    const initials=n.contactNom.split(' ').map(w=>w[0]).slice(0,2).join('');
    contact=`<div class="contact"><div class="cavatar">${initials}</div>
      <div class="cinfo"><div class="cname">${n.contactNom}</div>${T(n.contactRole)?'<div class="crole">'+T(n.contactRole)+'</div>':''}
      ${n.contactMail?'<a class="cmail" href="mailto:'+n.contactMail+'">'+n.contactMail+'</a>':''}</div></div>`;
  }
  const facts=[
    [T(I18N.lever),T(n.levier)],[T(I18N.region),T(n.region)],
    [T(I18N.period),p.periode],[T(I18N.partner),p.partenaire],[T(I18N.statusL),T(n.statut)]
  ].filter(f=>f[1]).map(f=>`<div class="fact-row"><span class="k">${f[0]}</span><span class="v">${f[1]}</span></div>`).join('');
  return `<div class="detail"><div class="detail-hero">${heroImg}
    <div class="hero-content">${p.acronyme?'<span class="acr-badge">'+p.acronyme+'</span><br>':''}<span class="type-badge">${T(n.levier)}</span><h2 class="display">${T(n.titre)}</h2></div></div>
    <div class="detail-grid"><div class="detail-main">
      ${T(n.defi)?'<div class="qblock"><div class="qlabel"><span class="dot"></span>'+T(I18N.challenge)+'</div><p>'+T(n.defi)+'</p></div>':''}
      ${T(n.reponse)?'<div class="qblock"><div class="qlabel"><span class="dot"></span>'+T(I18N.response)+'</div><p>'+T(n.reponse)+'</p></div>':''}
      ${declic}${video}</div>
    <div class="detail-side">
      <div class="fact-box"><h5>${T(I18N.keyFacts)}</h5>${facts}</div>
      ${T(n.transposable)||n.contactNom?`<div class="transpo"><div class="tlabel">⇄ ${T(I18N.transpoLabel)}</div>
        ${T(n.transposable)?'<div class="ttext">'+T(n.transposable)+'</div>':''}<div class="cta">${T(I18N.contactCta)}</div>${contact}</div>`:''}
    </div></div></div>`;}
const modal=document.getElementById('videoModal'),modalClose=document.getElementById('modalClose'),placeholder=document.getElementById('videoPlaceholder');
function openVideo(src){modal.classList.add('open');const ex=modal.querySelector('video');if(ex)ex.remove();
  const v=document.createElement('video');v.src=src;v.controls=true;v.autoplay=true;
  v.onerror=()=>{v.remove();placeholder.style.display='block';};v.onloadeddata=()=>{placeholder.style.display='none';};
  placeholder.style.display='block';modal.insertBefore(v,placeholder);resetIdle();}
modalClose.onclick=()=>{modal.classList.remove('open');const v=modal.querySelector('video');if(v)v.pause();};
let idleSeconds=0,idleCountdown;const IDLE_LIMIT=90,fill=document.getElementById('idleFill');
function resetIdle(){idleSeconds=0;fill.style.width='0%';clearInterval(idleCountdown);
  idleCountdown=setInterval(()=>{idleSeconds++;fill.style.width=(idleSeconds/IDLE_LIMIT*100)+'%';
    if(idleSeconds>=IDLE_LIMIT){clearInterval(idleCountdown);modal.classList.remove('open');setLang('en');go('home');}},1000);}
['click','touchstart','scroll','mousemove'].forEach(e=>document.addEventListener(e,resetIdle,{passive:true}));

function goBack(){
  if(nav.init!==null&&nav.init!==undefined){go('project',{axis:nav.axis,project:nav.project});}
  else if(nav.project){go('axis',{axis:nav.axis});}
  else if(nav.axis){go('home');}
}
function updateFab(){const f=document.getElementById('backFab');
  if(!f)return; f.classList.toggle('show', nav.axis!==null);}
document.getElementById('backFab').onclick=goBack;
document.querySelectorAll('.lang-switch button').forEach(b=>b.onclick=()=>setLang(b.dataset.lang));
setLang('en');go('home');
</script>
</body>
</html>
